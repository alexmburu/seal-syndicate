<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seal Syndicate | Revenue Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .ad-glow { border: 1px solid rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-12">

    <header class="w-full text-center mb-12">
        <h1 class="text-4xl font-black tracking-tighter text-blue-500">SEAL SYNDICATE</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em]">Neural Revenue Engine v2.0</p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <aside id="ad-window" class="md:col-span-1">
            <div class="glass ad-glow rounded-3xl p-8 flex flex-col items-center justify-center text-center min-h-[400px]">
                <span class="text-yellow-500 text-4xl mb-4">⚡</span>
                <h3 class="text-xl font-bold text-white mb-2">PREMIUM GEAR</h3>
                <p class="text-xs text-slate-400">Analyze the matrix to reveal partner offers.</p>
            </div>
        </aside>

        <div class="md:col-span-2 space-y-6">
            <button onclick="masterGenerator()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-3xl shadow-2xl transition-all active:scale-95 text-xl tracking-widest">
                GENERATE NEURAL TIPS
            </button>

            <div id="result-area" class="glass rounded-3xl p-8 hidden">
                <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                    <span class="text-xs font-black text-blue-400 uppercase tracking-widest">Quantum Treble</span>
                    <span id="total-odds" class="text-lg font-mono text-green-400 font-bold">Odds: 0.00</span>
                </div>
                
                <div id="treble-list" class="space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
